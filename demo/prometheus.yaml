global:
  scrape_interval: 15s

storage:
  tsdb:
    out_of_order_time_window: 720h

remote_write: []

scrape_configs:
  - job_name: "otel-collector"
    static_configs:
      - targets: ["otel-collector:8889"]
  - job_name: "pushgateway"
    honor_labels: true
    static_configs:
      - targets: ["pushgateway:9091"]
