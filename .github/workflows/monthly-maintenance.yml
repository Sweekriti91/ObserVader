name: Monthly Maintenance

on:
  schedule:
    # 1st of every month at 09:00 UTC
    - cron: "0 9 1 * *"
  workflow_dispatch: {}
  # Lightweight gate for documentation PRs (e.g., the weekly docs-sync
  # agentic workflow). Only the docs-baseline, link-check, and secret-scan
  # jobs are meaningful here; demo-flow runs on schedule only because it
  # spins up the full docker stack.
  pull_request:
    branches: [main]
    paths:
      - "docs/**"
      - ".github/skills/**"
      - "README.md"
      - ".github/workflows/monthly-maintenance.yml"

permissions:
  contents: read
  issues: write

jobs:
  docs-baseline:
    name: Verify docs baseline
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check README states reference-demo scope
        run: |
          grep -qi "seeded reference demo" README.md \
            || { echo "::error::README missing 'seeded reference demo' scope statement"; exit 1; }

      - name: Check fork-only Azure guidance is optional
        run: |
          if grep -rli "azure" docs/ --include='*.md' 2>/dev/null; then
            grep -rli "fork" docs/ --include='*.md' | head -1 | xargs grep -qi "optional\|fork-only\|deferred" \
              || { echo "::error::Azure guidance does not appear optional/fork-only"; exit 1; }
          fi

  link-check:
    name: Verify official links
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run lychee link checker
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --no-progress
            --exclude-path node_modules
            --accept 200,204,301,302,403,429
            --timeout 30
            --max-retries 3
            '**/*.md'
          fail: true

  demo-flow:
    name: Verify local seeded demo flow
    # Skip the heavy docker-compose flow on PR triggers — it is a monthly
    # smoke check, not a per-PR gate.
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Python dependencies
        run: pip install -r demo/requirements.txt

      - name: Install Node dependencies
        run: npm install tsx @opentelemetry/api @opentelemetry/sdk-trace-base @opentelemetry/exporter-trace-otlp-http
        working-directory: demo

      - name: Start demo stack
        run: docker compose up -d
        working-directory: demo

      - name: Wait for services to be healthy
        run: |
          echo "Waiting for OTel Collector..."
          timeout 60 bash -c 'until curl -sf http://localhost:13133/; do sleep 2; done'
          echo "Waiting for Grafana..."
          timeout 60 bash -c 'until curl -sf http://localhost:3001/api/health; do sleep 2; done'
          echo "Waiting for Jaeger..."
          timeout 60 bash -c 'until curl -sf http://localhost:16686/; do sleep 2; done'
          echo "Waiting for Prometheus..."
          timeout 60 bash -c 'until curl -sf http://localhost:9090/-/ready; do sleep 2; done'

      - name: Run generate_sample_data
        run: python3 scripts/generate_sample_data.py
        working-directory: demo

      - name: Run push_pr_metrics
        run: python3 scripts/push_pr_metrics.py
        working-directory: demo

      - name: Run seed-data
        run: npx tsx seed-data.ts --days 1
        working-directory: demo

      - name: Verify OTel Collector accepted data
        run: |
          # Collector health endpoint should still be healthy after ingestion
          curl -sf http://localhost:13133/ || { echo "::error::OTel Collector unhealthy after seeding"; exit 1; }

      - name: Verify Grafana dashboard has data
        run: |
          # Query Grafana API for dashboard existence
          curl -sf -u admin:demo http://localhost:3001/api/search?query=copilot \
            | python3 -c "import sys,json; ds=json.load(sys.stdin); assert len(ds)>0, 'No copilot dashboard found'" \
            || { echo "::error::Grafana copilot dashboard not found or empty"; exit 1; }

      - name: Tear down demo stack
        if: always()
        run: docker compose down -v
        working-directory: demo

  secret-scan:
    name: Verify no-secrets posture
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  open-issue:
    name: Open issue on failure
    runs-on: ubuntu-latest
    needs: [docs-baseline, link-check, demo-flow, secret-scan]
    # Only open a maintenance issue when the scheduled run fails — PR
    # failures already surface in the PR's checks UI.
    if: failure() && github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Create maintenance issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          MONTH=$(date +"%B %Y")

          gh issue create \
            --title "Monthly maintenance failure — ${MONTH}" \
            --label "maintenance" \
            --body "## Monthly maintenance check failed

          **Date:** $(date -u +%Y-%m-%d)
          **Run:** [View workflow run](${RUN_URL})

          ### Failed jobs
          Review the workflow run linked above for details on which checks failed.

          ### Runbook checklist
          - [ ] Docs baseline
          - [ ] Link check
          - [ ] Demo flow
          - [ ] Secret scan

          Please investigate the failures, fix them, and re-run the workflow."
